<div class="ramo-container">
  <div class="header">
    <h1>INFORMACIÓN DEL RAMO</h1>
  </div>

  <form class="form-container">
    <div class="form-grid">
      <div class="form-group">
        <label for="nombre">NOMBRE DEL RAMO</label>
        <input type="text" id="nombre" class="input-field" placeholder="Ingrese el nombre del ramo">
      </div>

      <div class="form-group">
        <label for="sector">SECTOR</label>
        <input type="text" id="sector" class="input-field" placeholder="Ingrese el sector">
      </div>

      <div class="form-group">
        <label for="colectivo">COLECTIVO (S/N)</label>
        <input type="text" id="colectivo" class="input-field" placeholder="S / N">
      </div>

      <div class="form-group">
        <label for="poliza">POLIZA GRUPO (S/N)</label>
        <input type="text" id="poliza" class="input-field" placeholder="S / N">
      </div>

      <div class="form-group">
        <label for="multiperiodos">MULTIPERIODOS (S/N)</label>
        <input type="text" id="multiperiodos" class="input-field" placeholder="S / N">
      </div>

      <div class="form-group">
        <label for="hojas">HOJAS ANEXAS (S/N)</label>
        <input type="text" id="hojas" class="input-field" placeholder="S / N">
      </div>

      <div class="form-group">
        <label for="clausulas">CLAUSULAS (S/N)</label>
        <input type="text" id="clausulas" class="input-field" placeholder="S / N">
      </div>

      <div class="form-group">
        <label for="obligatorio">OBLIGATORIO COTIZACION (S/N)</label>
        <input type="text" id="obligatorio" class="input-field" placeholder="S / N">
      </div>

      <div class="form-group">
        <label for="calculo">CALCULO DE LA PRIMA</label>
        <input type="text" id="calculo" class="input-field" placeholder="Describa el cálculo">
      </div>

      <div class="form-group">
        <label for="valorMinimo">VALOR PRIMA MINIMA POR POLIZA</label>
        <input type="text" id="valorMinimo" class="input-field" placeholder="Ingrese el valor mínimo">
      </div>

      <div class="form-group">
        <label for="agentes">NUMERO DE AGENTES DE LA POLIZA</label>
        <input type="text" id="agentes" class="input-field" placeholder="Ingrese el número">
      </div>

      <div class="form-group">
        <label for="tercero">TIPOS DE TERCERO</label>
        <input type="text" id="tercero" class="input-field" placeholder="Ingrese los tipos de tercero">
      </div>

      <div class="form-group full-width">
        <label for="adicional">INFORMACION ADICIONAL DEL RAMO</label>
        <textarea id="adicional" class="textarea-field" placeholder="Ingrese información adicional..." rows="5"></textarea>
      </div>
    </div>

    <div class="button-group">
      <button type="submit" class="btn-guardar">GUARDAR</button>
      <button type="reset" class="btn-limpiar">LIMPIAR</button>
    </div>
  </form>
</div>
