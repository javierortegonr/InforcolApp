<div class="container">
  <div class="menu">
    @for (item of menuItems; track item) {
      <button
        class="menu-item"
        [class.selected]="selectedItem === item"
        (click)="selectItem(item)"
      >
        {{ item }}
      </button>
    }
  </div>
  <div class="content">
    @if (selectedItem === 'NORMAS GENERALES') {
      <app-normas-generales></app-normas-generales>
    } @else if (selectedItem === 'RAMO') {
      <app-ramo></app-ramo>
    } @else if (selectedItem) {
      <h2>{{ selectedItem }}</h2>
      <p>Contenido para {{ selectedItem }}</p>
    } @else {
      <p class="placeholder">Selecciona un menú</p>
    }
  </div>
</div>

<router-outlet />
